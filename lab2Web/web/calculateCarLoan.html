<html>
    <head>
        <title>Car Loan Calculation</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
        }
        h1 {
            text-align: center;
        }
        fieldset {
            width: 400px;
            margin: auto;
        }
        label {
            display: inline-block;
            width: 120px;
        }
        input, select {
            margin: 5px 0;
        }
    </style>
    </head>
    <body>
        <h1>Perform Car Loan Calculation</h1>

<form action="processCalculateCarLoan.jsp" method="post">
    <fieldset>
        <legend>Loan Calculation</legend>

        <label>Loan Amount *</label>
        <input type="text" name="amount" placeholder="Amount" required><br>

        <label>Period</label>
        <select name="period">
            <option>3 years</option>
            <option>4 years</option>
            <option>5 years</option>
            <option>7 years</option>
        </select><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Cancel">
    </fieldset>
</form>
